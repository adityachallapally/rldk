artifacts:
- artifact:
    path_pattern: rldk_reports/determinism/*.json
    schema:
      required:
      - pass
      - seeds
      - checksums
      type: object
  cmd: check-determinism
- artifact:
    path_pattern: rldk_reports/reward_health/*.json
    schema:
      required:
      - pass
      - drift
      - signals
      type: object
  cmd: reward-health
- artifact:
    path_pattern: rldk_reports/repro/metadata.json
    schema:
      required:
      - command
      - seeds
      - git
      - pip_freeze
      type: object
  cmd: replay
