[tool:pytest]
# Pytest configuration for RLDK TRL integration tests

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for different test types
markers =
    unit: Unit tests that run quickly without external dependencies
    integration: Integration tests that may require network access or external services
    slow: Tests that take a long time to run (e.g., model downloads)
    trl: Tests related to TRL integration

# Test execution options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -m "not slow and not integration"

# Minimum version
minversion = 6.0

# Filter warnings
filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning