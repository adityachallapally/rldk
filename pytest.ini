[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Add src to Python path for imports
pythonpath = src

markers =
    unit: Unit tests that run quickly without external dependencies
    integration: Integration tests that may require network access or external services
    e2e: End-to-end tests that test complete workflows
    slow: Tests that take a long time to run (e.g., model downloads)
    trl: Tests related to TRL integration

addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -m "not slow and not integration and not e2e"

minversion = 6.0

filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning