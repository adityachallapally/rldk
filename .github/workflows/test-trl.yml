name: TRL Integration Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, 3.10, 3.11]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python3 -m pip install --upgrade pip
        pip install -e .
        pip install pytest pytest-cov
    
    - name: Run unit tests
      run: |
        pytest test_trl_unit.py -v --tb=short
    
    - name: Run integration tests (without model downloads)
      run: |
        pytest test_trl_integration.py -v --tb=short
    
    - name: Run example tests (without model downloads)
      run: |
        SKIP_MODEL_LOADING=true python3 test_trl_integration.py

  integration-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: 3.10
    
    - name: Install dependencies
      run: |
        python3 -m pip install --upgrade pip
        pip install -e .
        pip install pytest pytest-cov
    
    - name: Run integration tests with real models
      run: |
        pytest test_trl_integration_optional.py -m integration -v --tb=short
      env:
        # Allow longer timeout for model downloads
        PYTEST_TIMEOUT: 300