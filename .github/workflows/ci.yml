name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, 3.10, 3.11]

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Run tests
      run: |
        pytest tests/ -v --cov=rldk --cov-report=xml
    
    - name: Generate fixtures
      run: |
        python scripts/make_fixtures.py
    
    - name: Test KL spike detection
      run: |
        python runs_fixtures/test_spike_detection.py
    
    - name: Test CLI
      run: |
        rldk version
        rldk --help
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  reports:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.10
    
    - name: Install package
      run: |
        python -m pip install --upgrade pip
        pip install -e .
    
    - name: Generate fixtures
      run: |
        python scripts/make_fixtures.py
    
    - name: Generate diff report
      run: |
        rldk diff --a runs_fixtures/clean_ppo.jsonl --b runs_fixtures/kl_spike.jsonl --signals kl_mean,reward_mean --k 3 --window 20
    
    - name: Generate determinism report
      run: |
        echo "import pandas as pd; df = pd.DataFrame({'step': [1,2], 'reward_mean': [0.5, 0.6]}); df.to_json('metrics.jsonl', orient='records', lines=True)" > test_script.py
        rldk check-determinism --cmd "python test_script.py" --compare reward_mean
    
    - name: Upload reports as artifacts
      uses: actions/upload-artifact@v3
      with:
        name: example-reports
        path: |
          diff_analysis/
          determinism_analysis/
          runs_fixtures/
        retention-days: 30
