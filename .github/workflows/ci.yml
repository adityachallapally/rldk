name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Run linting
      run: |
        ruff check --fix
        black --check .
    
    - name: Run type checking
      run: |
        mypy src --ignore-missing-imports --no-strict-optional

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Generate test fixtures
      run: |
        python3 tests/_make_fixtures.py
    
    - name: Run tests
      run: |
        pytest -q --tb=short
    
    - name: Validate JSON artifacts
      run: |
        python -c "
        import json
        import jsonschema
        from pathlib import Path
        from rldk.io.schemas import DeterminismCardV1, PPOScanReportV1, CkptDiffReportV1, RewardDriftReportV1
        
        schemas = {
            'determinism_card.json': DeterminismCardV1,
            'ppo_scan.json': PPOScanReportV1,
            'ckpt_diff.json': CkptDiffReportV1,
            'reward_drift.json': RewardDriftReportV1,
        }
        
        reports_dir = Path('rldk_reports')
        if reports_dir.exists():
            for report_file in reports_dir.glob('*.json'):
                if report_file.name in schemas:
                    with open(report_file) as f:
                        data = json.load(f)
                    jsonschema.validate(data, schemas[report_file.name])
                    print(f'✓ Validated {report_file.name}')
        "
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: rldk-reports-${{ matrix.python-version }}
        path: rldk_reports/
        retention-days: 7

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install safety bandit
    
    - name: Run security checks
      run: |
        safety check
        bandit -r src/ -f json -o bandit-report.json || true
    
    - name: Upload security report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-report
        path: bandit-report.json
        retention-days: 30
